# This file contains common pin mappings for the BIGTREETECH EBB42
# Canbus board. To use this config, the firmware should be compiled for the
# STM32G0B1 with "8 MHz crystal" and "USB (on PA11/PA12)" or "CAN bus (on PB0/PB1)".
# The "EBB Can" micro-controller will be used to control the components on the nozzle.

# See docs/Config_Reference.md for a description of parameters.

[mcu EBB42]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_4D0047000A50425539393020-if00
#canbus_uuid: 0e0d81e4210c
restart_method: command

[adxl345]
cs_pin: EBB42: PB12
spi_software_sclk_pin: EBB42: PB10
spi_software_mosi_pin: EBB42: PB11
spi_software_miso_pin: EBB42: PB2
axes_map: x,y,z

[resonance_tester]
accel_chip: adxl345
probe_points: 325,320, 20

[extruder]  #APUS 2 Extruder
step_pin: EBB42: PD0
dir_pin: EBB42: PD1
enable_pin: !EBB42: PD2
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 1.0
gear_ratio: 10:58
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBB42: PB13
min_temp: 0
max_temp: 305
max_extrude_only_distance: 500
pressure_advance = 0.5

#PT1000 on Rapido
sensor_type:MAX31865
sensor_pin: EBB42: PA4
spi_bus: spi1
rtd_nominal_r: 100
rtd_reference_r: 430
rtd_num_of_wires: 2
spi_speed: 4000000
#tc_type: K
#tc_use_50Hz_filter: False
#tc_averaging_count: 1
rtd_use_50Hz_filter: False

[tmc2209 extruder]
uart_pin: EBB42: PA15
run_current: 0.60 #run_current: 0.75
#hold_current: 0.100
sense_resistor: 0.11
# driver_TBL: 0
# driver_HEND: 6
# driver_HSTRT: 7
# driver_TOFF: 4
# interpolate: True
stealthchop_threshold: 0


[output_pin fan0] #Part cooling fan
pin: !EBB42:PA1
pwm: True
cycle_time: 0.00004
hardware_pwm: false
value: 0.05
scale: 255
shutdown_value: 0.0

[heater_fan hotend_fan_1] #Hotend cooling fan
pin: EBB42: PA0
heater: extruder
heater_temp: 50.0

