######################################################################
# Misc Macros for Testing and Calibration
######################################################################

[delayed_gcode WELCOME]
initial_duration: 1
gcode:
  M118 Welcome to F-RACER

[gcode_macro DISABLE_MOTORS]
gcode: M84

[gcode_macro PRESSURE_ADVANCE_TEST]
gcode:
    SET_VELOCITY_LIMIT SQUARE_CORNER_VELOCITY=1 ACCEL=500
    TUNING_TOWER COMMAND=SET_PRESSURE_ADVANCE PARAMETER=ADVANCE START=0 FACTOR=.005

#Resonance Test
[gcode_macro RESONANCE_TEST]
gcode:
    SET_VELOCITY_LIMIT MINIMUM_CRUISE_RATIO=0
    SET_PRESSURE_ADVANCE ADVANCE=0
    SET_INPUT_SHAPER SHAPER_FREQ_X=0 SHAPER_FREQ_Y=0
    TUNING_TOWER COMMAND=SET_VELOCITY_LIMIT PARAMETER=ACCEL START=1500 STEP_DELTA=500 STEP_HEIGHT=5

#Resonance Test
[gcode_macro RESONANCE_RETEST]
gcode:
    SET_VELOCITY_LIMIT MINIMUM_CRUISE_RATIO=0
    #SET_PRESSURE_ADVANCE ADVANCE=0
    TUNING_TOWER COMMAND=SET_VELOCITY_LIMIT PARAMETER=ACCEL START=1500 STEP_DELTA=500 STEP_HEIGHT=5

#Resonance Test
[gcode_macro RESONANCE_RETEST_HA]
gcode:
    SET_VELOCITY_LIMIT MINIMUM_CRUISE_RATIO=0
    SET_PRESSURE_ADVANCE ADVANCE=0
    TUNING_TOWER COMMAND=SET_VELOCITY_LIMIT PARAMETER=ACCEL START=7500 STEP_DELTA=500 STEP_HEIGHT=5

#Disable Input Shaping
[gcode_macro DISABLE_INPUT_SHAPING]
gcode:
    SET_INPUT_SHAPER SHAPER_FREQ_X=0 SHAPER_FREQ_Y=0

[gcode_macro TEST_RESONANCES_AXIS_Y]
gcode:
    TEST_RESONANCES AXIS=Y

[gcode_macro TEST_RESONANCES_AXIS_X]
gcode:
    TEST_RESONANCES AXIS=X
